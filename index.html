<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churrascaria Bossardi</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Poppins,sans-serif;background:#f5f5f5;color:#333}
html{scroll-behavior:smooth}

/* HEADER */
header{
background:#8B4513;
color:#fff;
position:fixed;
width:100%;
top:0;
z-index:1000;
padding:1rem 2rem;
display:flex;
justify-content:space-between;
}

header h1{color:#FFD700;font-size:1.5rem}

/* HERO */
.hero{
height:100vh;
background:linear-gradient(rgba(0,0,0,.7),rgba(0,0,0,.7)),
url('https://images.unsplash.com/photo-1555992336-03a23c9f1d1a');
background-size:cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
}

.hero h2{font-size:3rem;margin-bottom:1rem}
.btn{
background:#FFD700;
padding:1rem 2rem;
border-radius:50px;
color:#8B4513;
text-decoration:none;
font-weight:600;
}

/* SECTIONS */
section{padding:5rem 2rem}
.container{max-width:1200px;margin:auto}

.section-title{
text-align:center;
font-size:2.5rem;
color:#8B4513;
margin-bottom:3rem;
letter-spacing:1px;
}

/* MENU PREMIUM */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.menu-item-img{
position:relative;
border-radius:15px;
overflow:hidden;
cursor:pointer;
border:2px solid rgba(255,215,0,0.2);
transition:.3s;
}

.menu-item-img img{
width:100%;
height:220px;
object-fit:cover;
filter:contrast(1.1) brightness(0.95) saturate(1.1);
transition:.4s;
}

.menu-item-img:hover img{
transform:scale(1.08);
}

.menu-item-img:hover{
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.menu-item-img::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

.menu-label{
position:absolute;
bottom:15px;
left:15px;
color:#fff;
font-weight:600;
z-index:2;
}

/* CONTATO */
.contact{
text-align:center;
}

.whatsapp{
display:inline-block;
margin-top:1rem;
background:#25D366;
color:#fff;
padding:1rem 2rem;
border-radius:50px;
text-decoration:none;
font-weight:600;
}

/* RESPONSIVO */
@media(max-width:768px){
.hero h2{font-size:2rem}
}
</style>
</head>

<body>

<header>
<h1>Bossardi</h1>
</header>

<section class="hero">
<div>
<h2>Churrascaria Premium</h2>
<p>O melhor rodízio da região</p>
<br>
<a href="#menu" class="btn">Ver Cardápio</a>
</div>
</section>

<section id="menu">
<div class="container">

<h2 class="section-title">Nosso Cardápio</h2>

<div class="menu-grid">

<div class="menu-item-img">
<img src="carne.jpg">
<div class="menu-label">Carnes Nobres</div>
</div>

<div class="menu-item-img">
<img src="salada.jpg">
<div class="menu-label">Buffet Saladas</div>
</div>

<div class="menu-item-img">
<img src="asinhas.jpg">
<div class="menu-label">Asinhas</div>
</div>

<div class="menu-item-img">
<img src="yakitori.jpg">
<div class="menu-label">Yakitori</div>
</div>

<div class="menu-item-img">
<img src="buffet.jpg">
<div class="menu-label">Buffet Quente</div>
</div>

</div>

</div>
</section>

<section class="contact">
<h2 class="section-title">Faça sua Reserva</h2>

<a href="https://wa.me/554136791420?text=Olá! Quero reservar uma mesa." 
target="_blank" class="whatsapp">
Reservar pelo WhatsApp
</a>

</section>

</body>
</html>
